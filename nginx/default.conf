server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Ẩn nginx version trong response headers và error pages
    server_tokens off;

    # Health check endpoint (không log để tránh noise)
    location /health {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # Block sensitive file paths
    location ~ ^/(\.env|\.git|\.svn|\.DS_Store|\.vscode) {
        return 444;
    }

    # Block WordPress / CMS scan paths
    location ~ ^/(wp-admin|wp-login|wp-content|wp-includes|wordpress|xmlrpc\.php) {
        return 444;
    }

    # Block PHP/admin tools
    location ~ ^/(phpmyadmin|adminer|pma|mysql) {
        return 444;
    }

    # Block PHP framework paths
    location ~ ^/(vendor|phpunit|laravel|yii|zend|drupal|cms) {
        return 444;
    }

    # Block Spring/Java actuator + API docs endpoints
    location ~ ^/(actuator|swagger|api-docs|v2/api-docs|v3/api-docs|debug|telescope|graphql|containers) {
        return 444;
    }

    # Block server info endpoints
    location ~ ^/(server-status|server-info|config\.json|info\.php|ecp) {
        return 444;
    }

    # Block database / shell endpoints
    location ~ ^/(backup|database|sql|dump|shell|cmd|exec|eval|cgi-bin) {
        return 444;
    }

    # Block dangerous file extensions
    location ~ \.(php|asp|aspx|jsp|cgi|pl|py|sh|bat|exe|dll|sql|bak|old|swp|env|ini|log|conf|action)$ {
        return 444;
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/x-javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # Vite hashed assets — cache forever (content-addressed filenames)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html — never cache (always fresh after deploy)
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # SPA fallback — tất cả routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
